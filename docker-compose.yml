services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: shosetu
      POSTGRES_PASSWORD: shosetu
      POSTGRES_DB: shosetu_reader
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shosetu"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://shosetu:shosetu@db:5432/shosetu_reader
      APP_URL: https://narou.oci.lidlesseye.net
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
